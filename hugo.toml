baseURL = "https://wvan24.github.io/"
languageCode = "zh-CN"
title = "Wvan"
theme = "claudian"
defaultContentLanguage = "zh"
enableRobotsTXT = true
hasCJKLanguage = true
enableGitInfo = true
summarizeLength = 80

[params]
  author      = "Wvan"
  description = "技术笔记与个人随笔"
  subtitle    = "Left is where lose right"
  heroTitle   = "Hello world!"
  heroSub     = "吾生也有涯，而知也无涯 · 以有涯随无涯，殆已！"

[menu]
  [[menu.main]]
    name   = "首页"
    url    = "/"
    weight = 1
  [[menu.main]]
    name   = "文章"
    url    = "/posts/"
    weight = 2
  [[menu.main]]
    name   = "标签"
    url    = "/tags/"
    weight = 3
  [[menu.main]]
    name   = "关于"
    url    = "/about/"
    weight = 4

[taxonomies]
  tag      = "tags"
  category = "categories"

[outputs]
  home     = ["HTML", "RSS"]
  page     = ["HTML"]
  section  = ["HTML", "RSS"]
  taxonomy = ["HTML"]

[markup]
  [markup.highlight]
    noClasses = false
    lineNos   = false
  [markup.goldmark.renderer]
    unsafe = true
